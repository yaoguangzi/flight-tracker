<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机票价格追踪 - 上海 → 太原</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 50%,#16213e 100%);color:#e2e8f0;min-height:100vh;padding:40px 20px}
.container{max-width:1200px;margin:0 auto}
header{text-align:center;margin-bottom:48px}
.live-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);border-radius:100px;font-size:13px;color:#34d399;margin-bottom:20px}
.live-badge::before{content:'';width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
h1{font-size:40px;font-weight:700;background:linear-gradient(135deg,#fff 0%,#94a3b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.route-box{display:inline-flex;align-items:center;gap:16px;padding:16px 32px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;font-size:18px;color:#94a3b8}
.route-box .city{color:#fff;font-weight:600}.route-box .arrow{font-size:24px}.route-box .date{color:#64748b;font-size:14px;margin-left:8px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}h1{font-size:32px}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr}}
.stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px;transition:all .3s ease}
.stat-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12);transform:translateY(-4px)}
.stat-card.best{background:linear-gradient(135deg,rgba(99,102,241,0.1) 0%,rgba(79,70,229,0.05) 100%);border-color:rgba(99,102,241,0.2)}
.stat-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.stat-icon.blue{background:rgba(99,102,241,0.15)}.stat-icon.green{background:rgba(16,185,129,0.15)}.stat-icon.orange{background:rgba(245,158,11,0.15)}.stat-icon.purple{background:rgba(139,92,246,0.15)}
.stat-label{font-size:13px;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:36px;font-weight:700;color:#fff;margin-top:8px}
.stat-sub{font-size:13px;color:#64748b;margin-top:4px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:500;margin-top:8px}
.tag.up{background:rgba(239,68,68,0.15);color:#f87171}.tag.down{background:rgba(16,185,129,0.15);color:#34d399}.tag.neutral{background:rgba(100,116,139,0.15);color:#94a3b8}
.chart-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:32px;margin-bottom:32px}
.section-title{font-size:20px;font-weight:600;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.chart-wrap{position:relative;height:320px}
.insights-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:900px){.insights-grid{grid-template-columns:1fr}}
.insight-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px}
.insight-card h3{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.insight-card p{font-size:14px;color:#94a3b8;line-height:1.6}
.insight-card .highlight{color:#fff;font-weight:500}
footer{text-align:center;padding:40px;color:#475569;font-size:13px}
</style>
</head>
<body>
<div class="container">
<header>
<div class="live-badge">● 实时监控中</div>
<h1>机票价格追踪</h1>
<div class="route-box">
<span class="city">上海</span>
<span class="arrow">✈️</span>
<span class="city">太原</span>
<span class="date">2025-04-10</span>
</div>
</header>
<div class="stats-grid">
<div class="stat-card best">
<div class="stat-header"><div class="stat-icon blue">💰</div><span class="stat-label">当前最低价</span></div>
<div class="stat-value" id="current-price">--</div>
<div class="stat-sub">含税费</div>
<div class="tag neutral" id="price-change">等待数据...</div>
</div>
<div class="stat-card">
<div class="stat-header"><div class="stat-icon green">🏆</div><span class="stat-label">历史最低</span></div>
<div class="stat-value" id="lowest-price">--</div>
<div class="stat-sub">建议入手参考</div>
</div>
<div class="stat-card">
<div class="stat-header"><div class="stat-icon orange">📊</div><span class="stat-label">平均价格</span></div>
<div class="stat-value" id="avg-price">--</div>
<div class="stat-sub">基准参考</div>
</div>
<div class="stat-card">
<div class="stat-header"><div class="stat-icon purple">📈</div><span class="stat-label">数据点</span></div>
<div class="stat-value" id="data-points">0</div>
<div class="stat-sub">持续更新</div>
</div>
</div>
<div class="chart-section">
<div class="section-title">📉 价格趋势</div>
<div class="chart-wrap"><canvas id="priceChart"></canvas></div>
</div>
<div class="insights-grid">
<div class="insight-card">
<h3>⏰ 最佳购买时机</h3>
<p id="best-time">数据累积中，建议提前2-3周关注价格变化...</p>
</div>
<div class="insight-card">
<h3>📊 价格波动</h3>
<p id="price-pattern">正在分析历史数据，识别价格规律...</p>
</div>
<div class="insight-card">
<h3>🎯 目标价格</h3>
<p id="target-price">建议设定价格提醒，低于<span class="highlight">均价10%</span>时入手</p>
</div>
</div>
<footer><p>最后更新: <span id="last-update">--</span> · 每2小时自动更新</p></footer>
</div>
<script>
const DATA_URL='https://raw.githubusercontent.com/yaoguangzi/flight-tracker/main/data/flight_data.json';
let chartInstance=null;

async function loadData(){
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('fail');
    return await r.json();
  }catch(e){
    console.log('load error',e);
    return{records:[],stats:{}};
  }
}

function updateStats(data){
  const r=data.records||[];
  if(!r.length){
    document.getElementById('best-time').textContent='暂无数据，等待首次更新...';
    return;
  }
  const prices=r.map(x=>x.lowest_price).filter(x=>x);
  const current=prices[prices.length-1];
  const lowest=Math.min(...prices);
  const avg=Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
  const prev=prices.length>1?prices[prices.length-2]:current;
  const change=current-prev;
  
  document.getElementById('current-price').textContent='¥'+current;
  document.getElementById('lowest-price').textContent='¥'+lowest;
  document.getElementById('avg-price').textContent='¥'+avg;
  document.getElementById('data-points').textContent=r.length;
  
  const el=document.getElementById('price-change');
  if(change>0){el.textContent='↑ '+change+' 较上次';el.className='tag up';}
  else if(change<0){el.textContent='↓ '+Math.abs(change)+' 较上次';el.className='tag down';}
  else{el.textContent='→ 持平';el.className='tag neutral';}
  
  if(current<=lowest*1.05)document.getElementById('best-time').textContent='🔥 当前价格接近历史最低，建议立即入手！';
  else if(current<=avg)document.getElementById('best-time').textContent='✅ 价格低于平均水平，可以考虑入手';
  else document.getElementById('best-time').textContent='⏳ 价格偏高，建议继续观望等待降价';
  
  const range=Math.max(...prices)-Math.min(...prices);
  const volatility=Math.round(range/Math.min(...prices)*100);
  document.getElementById('price-pattern').textContent='近'+prices.length+'次记录，价格波动'+volatility+'%，最高¥'+Math.max(...prices)+'，最低¥'+Math.min(...prices);
  
  document.getElementById('target-price').innerHTML='建议入手价: <span class="highlight">¥'+Math.round(avg*0.9)+'</span> 以下，当前'+(current<=avg*0.9?'已达标':'还需等待');
  
  const lastUpdate=data.stats?.last_check?new Date(data.stats.last_check).toLocaleString('zh-CN'):'--';
  document.getElementById('last-update').textContent=lastUpdate;
  
  drawChart(r);
}

function drawChart(records){
  const ctx=document.getElementById('priceChart').getContext('2d');
  const labels=records.map(x=>new Date(x.timestamp).toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}));
  const prices=records.map(x=>x.lowest_price);
  const avgs=records.map(x=>x.avg_price);
  
  if(chartInstance)chartInstance.destroy();
  
  chartInstance=new Chart(ctx,{
    type:'line',
    data:{
      labels:labels,
      datasets:[
        {label:'最低价',data:prices,borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,0.1)',borderWidth:3,pointRadius:5,pointBackgroundColor:'#6366f1',pointBorderColor:'#fff',pointBorderWidth:2,tension:0.4,fill:true},
        {label:'平均价',data:avgs,borderColor:'#f59e0b',backgroundColor:'transparent',borderWidth:2,borderDash:[5,5],pointRadius:3,tension:0.4}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#94a3b8',usePointStyle:true,padding:20}},
        tooltip:{backgroundColor:'rgba(15,15,35,0.95)',titleColor:'#fff',bodyColor:'#94a3b8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,padding:12,cornerRadius:8}
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b',maxRotation:0}},
        y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b',callback:v=>'¥'+v}}
      }
    }
  });
}

async function init(){
  const data=await loadData();
  updateStats(data);
}

init();
setInterval(init,5*60*1000);
</script>
</body>
</html>
