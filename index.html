<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机票价格追踪</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:30px 20px}
.container{max-width:1100px;margin:0 auto}
header{text-align:center;margin-bottom:40px}
h1{font-size:42px;font-weight:800;color:#fff;margin-bottom:12px}
.route-box{display:inline-flex;align-items:center;gap:12px;padding:16px 28px;background:rgba(255,255,255,0.2);border-radius:16px;font-size:18px;color:#fff}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}h1{font-size:32px}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr}}
.stat-card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.stat-card.best{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.stat-card.best .stat-label,.stat-card.best .stat-sub{color:rgba(255,255,255,0.8)}
.stat-label{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.stat-value{font-size:36px;font-weight:800;color:#2d3748;margin-top:8px}
.stat-card.best .stat-value{color:#fff}
.stat-sub{font-size:13px;color:#a0aec0;margin-top:4px}
.card{background:#fff;border-radius:24px;padding:28px;margin-bottom:24px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.card-title{font-size:20px;font-weight:700;color:#2d3748;margin-bottom:20px}
.flight-item{display:flex;align-items:center;gap:16px;padding:16px;background:#f7fafc;border-radius:12px;margin-bottom:12px}
.flight-item.best{background:#c6f6d5;border:2px solid #00d9a3}
.flight-time{min-width:80px}
.flight-time .dep{font-size:20px;font-weight:700;color:#2d3748}
.flight-time .arr{font-size:13px;color:#718096}
.flight-info{flex:1}
.flight-info .airline{font-size:16px;font-weight:600;color:#2d3748}
.flight-info .flight-no{font-size:12px;color:#718096}
.flight-price{text-align:right}
.flight-price .price{font-size:24px;font-weight:800;color:#667eea}
.flight-item.best .flight-price .price{color:#00b894}
.chart-wrap{height:300px}
footer{text-align:center;padding:30px;color:rgba(255,255,255,0.8);font-size:13px}
.loading{text-align:center;padding:40px;color:#718096}
.error{text-align:center;padding:40px;color:#e53e3e}
</style>
</head>
<body>
<div class="container">
<header>
<h1>✈️ 机票价格追踪</h1>
<div class="route-box">上海 → 太原 · 2025-04-10</div>
</header>

<div class="stats-grid">
<div class="stat-card best">
<div class="stat-label">当前最低价</div>
<div class="stat-value" id="current-price">--</div>
<div class="stat-sub" id="price-change">加载中...</div>
</div>
<div class="stat-card">
<div class="stat-label">历史最低</div>
<div class="stat-value" id="lowest-price">--</div>
<div class="stat-sub">建议入手参考</div>
</div>
<div class="stat-card">
<div class="stat-label">平均价格</div>
<div class="stat-value" id="avg-price">--</div>
<div class="stat-sub">基准参考</div>
</div>
<div class="stat-card">
<div class="stat-label">数据点</div>
<div class="stat-value" id="data-points">--</div>
<div class="stat-sub">持续更新</div>
</div>
</div>

<div class="card">
<div class="card-title">🛫 当日航班</div>
<div id="flight-list"><div class="loading">加载航班数据...</div></div>
</div>

<div class="card">
<div class="card-title">📉 价格趋势</div>
<div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>

<footer>
<p>最后更新: <span id="last-update">--</span> · 已收集 <span id="total-records">0</span> 条记录</p>
</footer>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/yaoguangzi/flight-tracker/main/data/flight_data.json';

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (err) {
    console.error('加载失败:', err);
    document.getElementById('flight-list').innerHTML = '<div class="error">加载失败: ' + err.message + '</div>';
    return null;
  }
}

function renderFlights(flights) {
  const container = document.getElementById('flight-list');
  if (!flights || !flights.length) {
    container.innerHTML = '<div class="loading">暂无航班数据</div>';
    return;
  }
  const minPrice = Math.min(...flights.map(f => f.price));
  container.innerHTML = flights.map(f => {
    const isBest = f.price === minPrice;
    const dep = f.dep_time || '--:--';
    const arr = f.arr_time || '--:--';
    return `<div class="flight-item ${isBest ? 'best' : ''}">
      <div class="flight-time">
        <div class="dep">${dep}</div>
        <div class="arr">${arr}</div>
      </div>
      <div class="flight-info">
        <div class="airline">${f.airline}</div>
        <div class="flight-no">${f.flight_no}</div>
      </div>
      <div class="flight-price">
        <div class="price">¥${f.price}</div>
      </div>
    </div>`;
  }).join('');
}

function renderChart(records) {
  const ctx = document.getElementById('chart').getContext('2d');
  const labels = records.map(r => {
    const d = new Date(r.timestamp);
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours() + ':00';
  });
  const prices = records.map(r => r.lowest_price);
  
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: '最低价',
        data: prices,
        borderColor: '#667eea',
        backgroundColor: 'rgba(102,126,234,0.1)',
        borderWidth: 3,
        pointRadius: 5,
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#718096' } },
        y: { grid: { color: '#e2e8f0' }, ticks: { color: '#718096', callback: v => '¥' + v } }
      }
    }
  });
}

async function init() {
  const data = await loadData();
  if (!data || !data.records) return;
  
  const records = data.records;
  const latest = records[records.length - 1];
  
  // 渲染航班
  renderFlights(latest.flights);
  
  // 统计数据
  const prices = records.map(r => r.lowest_price).filter(p => p);
  const current = prices[prices.length - 1];
  const lowest = Math.min(...prices);
  const avg = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length);
  
  document.getElementById('current-price').textContent = '¥' + current;
  document.getElementById('lowest-price').textContent = '¥' + lowest;
  document.getElementById('avg-price').textContent = '¥' + avg;
  document.getElementById('data-points').textContent = records.length;
  
  const prev = prices.length > 1 ? prices[prices.length - 2] : current;
  const change = current - prev;
  const changeEl = document.getElementById('price-change');
  if (change > 0) changeEl.textContent = '↑ ' + change + ' 较上次';
  else if (change < 0) changeEl.textContent = '↓ ' + Math.abs(change) + ' 较上次';
  else changeEl.textContent = '→ 持平';
  
  document.getElementById('total-records').textContent = records.length;
  document.getElementById('last-update').textContent = data.stats?.last_check 
    ? new Date(data.stats.last_check).toLocaleString('zh-CN') 
    : '--';
  
  // 渲染图表
  renderChart(records);
}

init();
</script>
</body>
</html>
